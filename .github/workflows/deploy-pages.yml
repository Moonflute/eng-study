name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html app.js styles.css manifest.webmanifest sw.js .nojekyll _site/
          cp -R data icons _site/

      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true

      - name: Ensure Pages uses gh-pages branch
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const { owner, repo } = context.repo;
            const source = { branch: "gh-pages", path: "/" };
            try {
              await github.rest.repos.updateInformationAboutPagesSite({ owner, repo, source });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.repos.createPagesSite({ owner, repo, source });
              } else {
                core.warning(`Could not update Pages source: ${error.message}`);
              }
            }